<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verification States — Design Export | Quity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ui-font: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --ui-bg: #0f1115;
      --ui-panel: #171a21;
      --ui-border: #2a2f3a;
      --ui-text: #e7e9ee;
      --ui-muted: #9aa1ad;
      --ui-accent: #e35353;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      background: var(--ui-bg);
      color: var(--ui-text);
      display: flex;
      flex-direction: column;
    }

    .app-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--ui-border);
      background: var(--ui-panel);
    }
    .app-head h1 {
      margin: 0;
      font-family: 'Jost', var(--ui-font);
      font-weight: 500;
      font-size: 17px;
      letter-spacing: 0.02em;
    }
    .app-head p {
      margin: 4px 0 0;
      font-size: 12.5px;
      color: var(--ui-muted);
    }
    .app-head code {
      font-size: 12px;
      color: #cdd2db;
      background: rgba(255,255,255,0.06);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 18px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--ui-border);
      background: var(--ui-panel);
    }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; }
    .tab {
      font-family: var(--ui-font);
      font-size: 13px;
      color: var(--ui-muted);
      background: transparent;
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      padding: 7px 14px;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--ui-text); border-color: #3a4150; }
    .tab[aria-selected="true"] {
      color: #fff;
      background: var(--ui-accent);
      border-color: var(--ui-accent);
    }
    .tab .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 7px;
      vertical-align: middle;
    }
    .dot--light { background: #c9ccd2; }
    .dot--dark { background: #4b515d; box-shadow: 0 0 0 1px #6b7280; }
    .dot--ok { background: #57b97f; }

    .spacer { flex: 1 1 auto; }

    .widths { display: flex; gap: 6px; align-items: center; }
    .widths span { font-size: 12px; color: var(--ui-muted); margin-right: 4px; }
    .wbtn {
      font-family: var(--ui-font);
      font-size: 12px;
      color: var(--ui-muted);
      background: transparent;
      border: 1px solid var(--ui-border);
      border-radius: 7px;
      padding: 6px 11px;
      cursor: pointer;
      transition: 0.15s;
    }
    .wbtn:hover { color: var(--ui-text); border-color: #3a4150; }
    .wbtn[aria-pressed="true"] { color: #fff; border-color: #5a6172; background: rgba(255,255,255,0.06); }

    .open-link {
      font-size: 12px;
      color: var(--ui-muted);
      border: 1px solid var(--ui-border);
      border-radius: 7px;
      padding: 6px 11px;
      text-decoration: none;
      transition: 0.15s;
    }
    .open-link:hover { color: var(--ui-text); border-color: #3a4150; }

    .stage {
      flex: 1 1 auto;
      overflow: auto;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background:
        linear-gradient(0deg, rgba(255,255,255,0.015), rgba(255,255,255,0.015)),
        var(--ui-bg);
    }
    .device {
      width: 100%;
      max-width: 1280px;
      height: 78vh;
      min-height: 480px;
      background: #fff;
      border: 1px solid var(--ui-border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      transition: max-width 0.2s ease;
    }
    .device iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <header class="app-head">
    <h1>Quity — Customer Verification States</h1>
    <p>Standalone export of <code>snippets/customer-gate-status.liquid</code> for redesign. Pick a state; switch widths to check responsiveness.</p>
  </header>

  <div class="toolbar">
    <div class="tabs" role="tablist" aria-label="Verification states">
      <button class="tab" role="tab" aria-selected="true"  data-src="account-required.html"><span class="dot dot--light"></span>Account Required</button>
      <button class="tab" role="tab" aria-selected="false" data-src="verification-pending.html"><span class="dot dot--light"></span>Verification In Progress</button>
      <button class="tab" role="tab" aria-selected="false" data-src="access-denied.html"><span class="dot dot--dark"></span>Access Denied</button>
      <button class="tab" role="tab" aria-selected="false" data-src="access-expired.html"><span class="dot dot--dark"></span>Access Expired</button>
      <button class="tab" role="tab" aria-selected="false" data-src="approved.html"><span class="dot dot--ok"></span>Approved</button>
    </div>

    <div class="spacer"></div>

    <div class="widths">
      <span>Width</span>
      <button class="wbtn" data-w="375">Mobile</button>
      <button class="wbtn" data-w="768">Tablet</button>
      <button class="wbtn" aria-pressed="true" data-w="full">Desktop</button>
    </div>

    <a class="open-link" id="openLink" href="account-required.html" target="_blank" rel="noopener">Open standalone &#8599;</a>
  </div>

  <main class="stage">
    <div class="device" id="device">
      <iframe id="frame" src="account-required.html" title="Verification state preview"></iframe>
    </div>
  </main>

  <script>
    (function () {
      var frame = document.getElementById('frame');
      var device = document.getElementById('device');
      var openLink = document.getElementById('openLink');
      var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
      var wbtns = Array.prototype.slice.call(document.querySelectorAll('.wbtn'));

      function selectTab(tab) {
        tabs.forEach(function (t) { t.setAttribute('aria-selected', String(t === tab)); });
        var src = tab.getAttribute('data-src');
        frame.src = src;
        openLink.href = src;
      }

      function selectWidth(btn) {
        wbtns.forEach(function (b) { b.setAttribute('aria-pressed', String(b === btn)); });
        var w = btn.getAttribute('data-w');
        device.style.maxWidth = (w === 'full') ? '1280px' : (w + 'px');
      }

      tabs.forEach(function (t) { t.addEventListener('click', function () { selectTab(t); }); });
      wbtns.forEach(function (b) { b.addEventListener('click', function () { selectWidth(b); }); });
    })();
  </script>
</body>
</html>
