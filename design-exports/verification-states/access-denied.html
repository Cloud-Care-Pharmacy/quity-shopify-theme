<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Denied — Verification | Quity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- State: Declined (customer-gate--denied) -->
  <div class="customer-gate customer-gate--denied">
    <div class="customer-gate__inner">
      <h1 class="customer-gate__heading">
        <span class="customer-gate__heading-primary">Access</span>
        <span class="customer-gate__heading-accent">Denied</span>
      </h1>
      <p class="customer-gate__message">
        This area is only available to verified patients. If you think this is a mistake, please reach out to our team for assistance.
      </p>
      <div class="customer-gate__actions">
        <a href="/pages/contact" class="btn-outline btn-outline-white">Support</a>
        <a href="/" class="btn-outline btn-outline-white">Head Home</a>
      </div>
    </div>
  </div>
</body>
</html>
